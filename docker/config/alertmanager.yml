global:
  resolve_timeout: 10s

route:
  group_by: ['alertname', 'service']
  group_wait: 5s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'aisignal-backend'

receivers:
  - name: 'aisignal-backend'
    webhook_configs:
      - url: 'http://host.docker.internal:3000/api/webhooks/alertmanager'
        send_resolved: true
